<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .logo { fill: none; stroke: #1a472a; }
    .logo-fill { fill: #1a472a; stroke: none; }
    @media (prefers-color-scheme: dark) {
      .logo { stroke: #3f9d6a; }
      .logo-fill { fill: #3f9d6a; }
    }
  </style>
  <!-- Outer diamond outline (thin, matches the ◈ glyph) -->
  <path class="logo" stroke-width="2.4" stroke-linejoin="round" d="M16 3 L29 16 L16 29 L3 16 Z"/>
  <!-- Center solid diamond -->
  <path class="logo-fill" d="M16 10 L22 16 L16 22 L10 16 Z"/>
</svg>
