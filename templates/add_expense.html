{% extends "base.html" %}

{% block title %}Add Expense — Balance Desk{% endblock %}

{% block content %}

<section class="form-page">
    <div class="form-page-inner">

        <div class="form-page-header">
            <div>
                <p class="form-page-breadcrumb">
                    <a href="{{ url_for('expenses.list_expenses') }}">Expenses</a> /
                </p>
                <h1 class="form-page-title">Add Expense</h1>
            </div>
        </div>

        {% if error %}
        <div class="auth-error" style="margin-bottom:1.5rem;">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('expenses.add_expense') }}" class="expense-form">

            <div class="expense-form-grid">

                <!-- Row 1 -->
                <div class="form-group">
                    <label for="date">Date <span class="req">*</span></label>
                    <input type="date" id="date" name="date" class="form-input"
                           value="{{ form.get('date', today) }}" required>
                </div>

                <div class="form-group">
                    <label for="title">Title <span class="req">*</span></label>
                    <input type="text" id="title" name="title" class="form-input"
                           placeholder="e.g. Starbucks, Walmart"
                           value="{{ form.get('title', '') }}" required autofocus>
                </div>

                <div class="form-group form-group--full">
                    <label for="description">Description</label>
                    <input type="text" id="description" name="description" class="form-input"
                           placeholder="Optional note"
                           value="{{ form.get('description', '') }}">
                </div>

                <!-- Row 2 -->
                <div class="form-group">
                    <label for="category">Category <span class="req">*</span></label>
                    <input type="text" id="category" name="category" class="form-input"
                           list="category-options"
                           placeholder="Select or type new…"
                           value="{{ form.get('category', '') }}" required>
                    <datalist id="category-options">
                        {% for c in categories %}
                        <option value="{{ c }}">
                        {% endfor %}
                    </datalist>
                </div>

                <div class="form-group">
                    <label for="mode">Mode</label>
                    <input type="text" id="mode" name="mode" class="form-input"
                           list="mode-options"
                           placeholder="Select or type new…"
                           value="{{ form.get('mode', '') }}">
                    <datalist id="mode-options">
                        {% for m in modes %}
                        <option value="{{ m }}">
                        {% endfor %}
                    </datalist>
                </div>

                <!-- Row 3 -->
                <div class="form-group">
                    <label for="amount">Amount ($) <span class="req">*</span></label>
                    <input type="number" id="amount" name="amount" class="form-input"
                           min="0.01" step="0.01" placeholder="0.00"
                           value="{{ form.get('amount', '') }}" required>
                </div>

                <div class="form-group">
                    <label for="split">
                        Split ($)
                        <span class="split-hint" id="split-hint">—</span>
                    </label>
                    <input type="number" id="split" name="split" class="form-input"
                           min="0" step="0.01" placeholder="0.00"
                           value="{{ form.get('split', '') }}">
                </div>

            </div>

            <div class="expense-form-actions">
                <a href="{{ url_for('expenses.list_expenses') }}" class="btn-ghost">Cancel</a>
                <div class="expense-form-submit-group">
                    <button type="submit" name="next" value="list" class="btn-primary">
                        Save expense
                    </button>
                    <button type="submit" name="next" value="add" class="btn-ghost">
                        Save &amp; add another
                    </button>
                </div>
            </div>

        </form>

    </div>
</section>

{% endblock %}

{% block scripts %}
<script>
    const modeInput  = document.getElementById('mode');
    const splitHint  = document.getElementById('split-hint');

    function updateSplitHint() {
        const val = modeInput.value.trim().toUpperCase();
        if (val === 'FRIEND') {
            splitHint.textContent = 'you owe';
            splitHint.className = 'split-hint split-hint--owe';
        } else if (val) {
            splitHint.textContent = 'friend owes you';
            splitHint.className = 'split-hint split-hint--owed';
        } else {
            splitHint.textContent = '—';
            splitHint.className = 'split-hint';
        }
    }

    modeInput.addEventListener('input', updateSplitHint);
    updateSplitHint();
</script>
{% endblock %}
